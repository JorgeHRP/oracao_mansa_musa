<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Formulário de Contacto</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #f4f4f4;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      border: 1px solid #e0e0e0;
      padding: 2rem;
      width: 100%;
      max-width: 480px;
    }

    h2 {
      font-size: 20px;
      font-weight: 500;
      margin-bottom: 1.5rem;
      color: #111;
    }

    .grupo {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    label {
      display: block;
      font-size: 13px;
      color: #666;
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="email"],
    select,
    textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      color: #111;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus, select:focus, textarea:focus {
      border-color: #888;
    }

    textarea {
      resize: vertical;
    }

    .checkbox {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #666;
    }

    button {
      width: 100%;
      padding: 11px;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #333; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Contacto</h2>
    <div class="grupo">
      <div>
        <label for="nome">Nome</label>
        <input type="text" id="nome" placeholder="O seu nome" />
      </div>
      <div>
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="email@exemplo.com" />
      </div>
      <div>
        <label for="assunto">Assunto</label>
        <select id="assunto">
          <option value="">Selecione um assunto</option>
          <option>Informação geral</option>
          <option>Suporte técnico</option>
          <option>Faturação</option>
          <option>Outro</option>
        </select>
      </div>
      <div>
        <label for="mensagem">Mensagem</label>
        <textarea id="mensagem" rows="4" placeholder="Escreva a sua mensagem aqui..."></textarea>
      </div>
      <label class="checkbox">
        <input type="checkbox" /> Aceito os termos e condições
      </label>
      <button type="button">Enviar mensagem</button>
    </div>
  </div>
</body>
</html>
